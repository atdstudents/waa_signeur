<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Waasigneur — Podcasts</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap');
    :root { --orange:#E8621A; --dark:#0d0d0d; --dark2:#1a1a1a; --white:#fff; }
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { width:100%; height:100%; overflow:hidden; background:var(--dark); font-family:'DM Sans',sans-serif; color:var(--white); }

    /* INTRO */
    #intro { position:fixed; inset:0; z-index:1000; background:var(--dark); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:1rem; }
    .intro-logo-img { height:60px; opacity:0; transform:translateY(20px); animation:introUp 0.7s 0.2s forwards ease; }
    .intro-sub { font-size:0.8rem; color:rgba(255,255,255,0.3); letter-spacing:3px; text-transform:uppercase; opacity:0; animation:introUp 0.7s 0.5s forwards ease; }
    .intro-bar-wrap { width:160px; height:2px; background:rgba(255,255,255,0.08); border-radius:2px; overflow:hidden; margin-top:0.8rem; opacity:0; animation:introUp 0.5s 0.7s forwards ease; }
    .intro-bar { height:100%; background:var(--orange); width:0; animation:barFill 1s 0.8s forwards ease; }
    @keyframes introUp { to { opacity:1; transform:translateY(0); } }
    @keyframes barFill { to { width:100%; } }

    /* BG */
    #bg-canvas { position:fixed; inset:0; z-index:0; opacity:0.5; }

    /* TOPBAR */
    .topbar { position:fixed; top:0; left:0; right:0; z-index:100; padding:1rem 2.5rem; display:flex; align-items:center; justify-content:space-between; background:linear-gradient(to bottom,rgba(13,13,13,0.95),transparent); opacity:0; transition:opacity 0.8s; }
    .topbar.visible { opacity:1; }
    .logo-link { display:flex; align-items:center; text-decoration:none; }
    .logo-img { height:38px; }
    .top-nav { display:flex; gap:1.5rem; align-items:center; }
    .top-nav a { color:rgba(255,255,255,0.45); text-decoration:none; font-size:0.84rem; font-weight:500; transition:color 0.2s; }
    .top-nav a:hover { color:var(--orange); }
    .top-nav a.active { color:var(--orange); }
    .top-cta { background:var(--orange)!important; color:var(--white)!important; padding:0.4rem 1.1rem; border-radius:50px; font-weight:600!important; box-shadow:0 4px 15px rgba(232,98,26,0.35); }

    /* MAIN */
    #main { position:fixed; inset:0; z-index:10; opacity:0; transition:opacity 0.8s; padding-top:70px; padding-bottom:70px; overflow:hidden; display:flex; flex-direction:column; }
    #main.visible { opacity:1; }

    /* HEADER */
    .page-header { padding:1.5rem 2.5rem 1rem; flex-shrink:0; }
    .page-tag { font-size:0.7rem; color:var(--orange); text-transform:uppercase; letter-spacing:2px; font-weight:600; margin-bottom:0.4rem; }
    .page-title { font-family:'Playfair Display',serif; font-size:2.2rem; font-weight:900; line-height:1.1; }
    .page-sub { font-size:0.85rem; color:rgba(255,255,255,0.35); margin-top:0.4rem; }

    /* PODCAST GRID */
    #podcasts-wrap { flex:1; overflow-y:auto; padding:0 2.5rem 1rem; }
    #podcasts-wrap::-webkit-scrollbar { width:4px; }
    #podcasts-wrap::-webkit-scrollbar-thumb { background:rgba(232,98,26,0.3); border-radius:2px; }

    .podcasts-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1.2rem; }

    .podcast-card {
      border-radius:18px; overflow:hidden; background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.07); cursor:pointer;
      transition:transform 0.3s,box-shadow 0.3s,border-color 0.3s;
      opacity:0; transform:translateY(20px); animation:cardIn 0.5s forwards ease;
    }
    .podcast-card:hover { transform:translateY(-6px); box-shadow:0 20px 50px rgba(0,0,0,0.5); border-color:rgba(232,98,26,0.4); }
    @keyframes cardIn { to { opacity:1; transform:translateY(0); } }

    .podcast-thumb {
      height:180px; position:relative; overflow:hidden;
      background:linear-gradient(135deg,#1a1a1a,#2a2a2a);
      display:flex; align-items:center; justify-content:center;
    }
    .podcast-thumb-bg { position:absolute; inset:0; opacity:0.15; font-size:8rem; display:flex; align-items:center; justify-content:center; }
    .play-btn {
      width:60px; height:60px; background:var(--orange); border-radius:50%;
      display:flex; align-items:center; justify-content:center; font-size:1.3rem;
      position:relative; z-index:1; transition:transform 0.3s,box-shadow 0.3s;
      box-shadow:0 4px 20px rgba(232,98,26,0.4);
    }
    .podcast-card:hover .play-btn { transform:scale(1.15); box-shadow:0 0 0 16px rgba(232,98,26,0.15); }
    .podcast-ep-badge { position:absolute; top:1rem; left:1rem; background:rgba(232,98,26,0.9); color:#fff; font-size:0.68rem; font-weight:700; padding:0.25rem 0.7rem; border-radius:50px; letter-spacing:1px; text-transform:uppercase; }
    .podcast-duration { position:absolute; bottom:1rem; right:1rem; background:rgba(0,0,0,0.6); color:rgba(255,255,255,0.7); font-size:0.72rem; padding:0.2rem 0.6rem; border-radius:50px; }

    .podcast-body { padding:1.2rem; }
    .podcast-spec { font-size:0.68rem; color:var(--orange); text-transform:uppercase; letter-spacing:1.5px; font-weight:600; margin-bottom:0.3rem; }
    .podcast-title { font-family:'Playfair Display',serif; font-size:1rem; font-weight:700; margin-bottom:0.4rem; line-height:1.3; }
    .podcast-guest { font-size:0.8rem; color:rgba(255,255,255,0.4); display:flex; align-items:center; gap:0.4rem; }

    /* VIDEO PLAYER OVERLAY */
    #player { position:fixed; inset:0; z-index:500; background:rgba(5,5,5,0.97); display:flex; align-items:center; justify-content:center; flex-direction:column; opacity:0; pointer-events:none; transition:opacity 0.4s; backdrop-filter:blur(20px); }
    #player.open { opacity:1; pointer-events:all; }
    .player-box { width:min(800px,90vw); position:relative; }
    .player-close { position:absolute; top:-50px; right:0; width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.08); border:none; color:rgba(255,255,255,0.6); font-size:1.1rem; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; }
    .player-close:hover { background:var(--orange); color:#fff; }
    .player-video { width:100%; aspect-ratio:16/9; border-radius:16px; overflow:hidden; background:#000; border:1px solid rgba(232,98,26,0.2); display:flex; align-items:center; justify-content:center; font-size:5rem; }
    .player-info { margin-top:1.2rem; text-align:center; }
    .player-title { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700; color:#fff; margin-bottom:0.3rem; }
    .player-guest { font-size:0.85rem; color:rgba(255,255,255,0.4); }
    .player-nav { display:flex; gap:1rem; justify-content:center; margin-top:1rem; }
    .player-nav-btn { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.5); padding:0.5rem 1.2rem; border-radius:50px; font-family:'DM Sans',sans-serif; font-size:0.84rem; cursor:pointer; transition:all 0.2s; }
    .player-nav-btn:hover { border-color:var(--orange); color:var(--orange); }

    /* BOTTOM BAR */
    .bottombar { position:fixed; bottom:0; left:0; right:0; z-index:20; padding:1rem 2.5rem; display:flex; align-items:center; justify-content:space-between; background:linear-gradient(to top,rgba(13,13,13,0.95),transparent); }
    .stats-row { display:flex; gap:2rem; }
    .stat-item { text-align:center; }
    .stat-num { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:900; color:var(--orange); }
    .stat-lbl { font-size:0.62rem; color:rgba(255,255,255,0.25); text-transform:uppercase; letter-spacing:1px; }
    .back-btn { display:flex; align-items:center; gap:0.5rem; color:rgba(255,255,255,0.4); text-decoration:none; font-size:0.84rem; font-weight:500; transition:color 0.2s; }
    .back-btn:hover { color:var(--orange); }

    @media(max-width:600px) { .topbar{padding:1rem 1.2rem;} .top-nav{display:none;} .page-header{padding:1rem 1.2rem;} #podcasts-wrap{padding:0 1.2rem 1rem;} .podcasts-grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>

<div id="intro">
  <img src="logo_waasigneur.png" class="intro-logo-img" alt="Waasigneur"/>
  <div class="intro-sub">Podcasts avec les enseignants</div>
  <div class="intro-bar-wrap"><div class="intro-bar"></div></div>
</div>

<canvas id="bg-canvas"></canvas>

<div class="topbar" id="topbar">
  <a href="index.html" class="logo-link">
    <img src="logo_waasigneur.png" class="logo-img" alt="Waasigneur"/>
  </a>
  <nav class="top-nav">
    <a href="index.html">Accueil</a>
    <a href="projects.html">Projets</a>
    <a href="podcasts.html" class="active">Podcasts</a>
    <a href="admin.html" class="top-cta">Admin →</a>
  </nav>
</div>

<div id="main">
  <div class="page-header">
    <div class="page-tag">Écouter & Regarder</div>
    <div class="page-title">Podcasts avec les enseignants</div>
    <div class="page-sub">5 épisodes — Conversations autour du design et de la création</div>
  </div>
  <div id="podcasts-wrap">
    <div class="podcasts-grid" id="podcasts-grid"></div>
  </div>
</div>

<div class="bottombar">
  <a href="index.html" class="back-btn">← Retour à l'accueil</a>
  <div class="stats-row">
    <div class="stat-item"><div class="stat-num">5</div><div class="stat-lbl">Épisodes</div></div>
    <div class="stat-item"><div class="stat-num">4</div><div class="stat-lbl">Enseignants</div></div>
    <div class="stat-item"><div class="stat-num">3</div><div class="stat-lbl">Spécialités</div></div>
  </div>
</div>

<!-- VIDEO PLAYER -->
<div id="player">
  <div class="player-box">
    <button class="player-close" onclick="closePlayer()">✕</button>
    <div class="player-video" id="player-video"></div>
    <div class="player-info">
      <div class="player-title" id="player-title"></div>
      <div class="player-guest" id="player-guest"></div>
    </div>
    <div class="player-nav">
      <button class="player-nav-btn" onclick="prevPodcast()">← Épisode précédent</button>
      <button class="player-nav-btn" onclick="nextPodcast()">Épisode suivant →</button>
    </div>
  </div>
</div>

<script>
const PODCASTS = [
  { id:1, ep:'Épisode 01', title:'Le design graphique : art et communication', guest:'Avec Mme. Aicha Zriga', spec:'Design Image', icon:'🎨', duration:'42 min', youtube:'' },
  { id:2, ep:'Épisode 02', title:'Architecture d\'intérieur : entre tradition et modernité', guest:'Avec Mme. Karima Kacem', spec:'Design Espace', icon:'🏛️', duration:'38 min', youtube:'' },
  { id:3, ep:'Épisode 03 — Part 1', title:'Scénographie : raconter une histoire dans l\'espace', guest:'Avec Mme. Amira Jaghmoun', spec:'Design Espace', icon:'🎭', duration:'35 min', youtube:'' },
  { id:4, ep:'Épisode 03 — Part 2', title:'Scénographie : techniques et mise en scène', guest:'Avec Mme. Amira Jaghmoun', spec:'Design Espace', icon:'🎬', duration:'29 min', youtube:'' },
  { id:5, ep:'Épisode 04', title:'Création industrielle durable : matériaux et innovation', guest:'Avec M. Ramzi Salah', spec:'Design Produit', icon:'⚙️', duration:'45 min', youtube:'' },
];

let currentPodcast = 0;

// BG canvas
const bgCanvas=document.getElementById('bg-canvas');
const bgCtx=bgCanvas.getContext('2d');
let particles=[];
function initBg(){ bgCanvas.width=window.innerWidth; bgCanvas.height=window.innerHeight; particles=Array.from({length:50},()=>({x:Math.random()*bgCanvas.width,y:Math.random()*bgCanvas.height,r:Math.random()*1.5+0.5,vx:(Math.random()-0.5)*0.2,vy:(Math.random()-0.5)*0.2,alpha:Math.random()*0.2+0.05})); }
function drawBg(){ bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height); particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; if(p.x<0)p.x=bgCanvas.width; if(p.x>bgCanvas.width)p.x=0; if(p.y<0)p.y=bgCanvas.height; if(p.y>bgCanvas.height)p.y=0; bgCtx.beginPath(); bgCtx.arc(p.x,p.y,p.r,0,Math.PI*2); bgCtx.fillStyle=`rgba(232,98,26,${p.alpha})`; bgCtx.fill(); }); requestAnimationFrame(drawBg); }
window.addEventListener('resize',initBg); initBg(); drawBg();

function renderPodcasts(){
  const grid=document.getElementById('podcasts-grid');
  grid.innerHTML='';
  PODCASTS.forEach((p,i)=>{
    const card=document.createElement('div');
    card.className='podcast-card';
    card.style.animationDelay=(i*100)+'ms';
    card.innerHTML=`
      <div class="podcast-thumb">
        <div class="podcast-thumb-bg">${p.icon}</div>
        <div class="podcast-ep-badge">${p.ep}</div>
        <div class="play-btn">▶</div>
        <div class="podcast-duration">⏱ ${p.duration}</div>
      </div>
      <div class="podcast-body">
        <div class="podcast-spec">${p.spec}</div>
        <div class="podcast-title">${p.title}</div>
        <div class="podcast-guest">🎓 ${p.guest}</div>
      </div>`;
    card.onclick=()=>openPlayer(i);
    grid.appendChild(card);
  });
}

function openPlayer(idx){
  currentPodcast=idx;
  const p=PODCASTS[idx];
  const videoEl=document.getElementById('player-video');
  if(p.youtube){
    videoEl.innerHTML=`<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${p.youtube}?autoplay=1" frameborder="0" allowfullscreen style="border-radius:16px"></iframe>`;
  } else {
    videoEl.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;gap:1rem;color:rgba(255,255,255,0.3)"><div style="font-size:4rem">${p.icon}</div><div style="font-size:0.85rem">Vidéo à venir — Ajoute l'URL YouTube dans le code</div></div>`;
  }
  document.getElementById('player-title').textContent=p.title;
  document.getElementById('player-guest').textContent=p.guest+' · '+p.ep;
  document.getElementById('player').classList.add('open');
}

function closePlayer(){
  document.getElementById('player').classList.remove('open');
  document.getElementById('player-video').innerHTML='';
}

function prevPodcast(){ if(currentPodcast>0) openPlayer(currentPodcast-1); }
function nextPodcast(){ if(currentPodcast<PODCASTS.length-1) openPlayer(currentPodcast+1); }

document.getElementById('player').addEventListener('click',function(e){ if(e.target===this) closePlayer(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closePlayer(); });

setTimeout(()=>{
  const intro=document.getElementById('intro');
  intro.style.transition='opacity 0.8s'; intro.style.opacity='0';
  setTimeout(()=>{ intro.style.display='none'; document.getElementById('topbar').classList.add('visible'); document.getElementById('main').classList.add('visible'); renderPodcasts(); },800);
},2000);
</script>
</body>
</html>
